generator:
  model: "Qwen/Qwen3.5-9B"
  max_length: 2048
  temperature: 0.7
  top_p: 0.9
  num_traces_per_question: 3
  batch_size: 4

detector:
  hidden_size: 4096  # Qwen3.5-9B hidden dim
  num_layers_to_probe: [8, 16, 24, 32]
  learning_rate: 1.0e-3
  weight_decay: 0.01
  num_epochs: 20
  batch_size: 64
  train_ratio: 0.8
  threshold: 0.5

intervention:
  model: "Qwen/Qwen3.5-9B"
  num_actions: 5
  actions: ["continue", "truncate", "backtrack", "retrieve", "restart"]
  ppo_config:
    num_epochs: 100
    batch_size: 256
    learning_rate: 3.0e-4
    gamma: 0.99
    clip_range: 0.2
    value_coeff: 0.5
    entropy_coeff: 0.01
    ppo_epochs: 4
    hidden_dim: 128
  backtrack_window: 3
  max_interventions_per_trace: 5

datasets:
  truthfulqa:
    name: "truthful_qa"
    config: "generation"
    split: "validation"
  halueval:
    name: "pminervini/HaluEval"
    config: "qa_samples"
    split: "data"
  faithdial:
    name: "McGill-NLP/FaithDial"
    config: null
    split: "test"

eval:
  num_samples: 500
  temperature: 0.0
  max_new_tokens: 512
  batch_size: 4
  num_seeds: 3
  seeds: [42, 137, 2024]

labeling:
  method: "llm_nli"
  nli_model: "microsoft/deberta-v3-large-mnli"
  llm_judge: "Qwen/Qwen3.5-9B"
  claim_extraction: true
  min_claim_confidence: 0.7

baselines:
  - "no_intervention"
  - "always_truncate"
  - "oracle_detector"
  - "dola"
  - "iti"
  - "selfcheckgpt"

output:
  traces_dir: "./data/traces"
  detector_dir: "./checkpoints/detector"
  policy_dir: "./checkpoints/intervention_policy"
  results_dir: "./results"
